name: RuboCop

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rubocop:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run RuboCop
        run: |
          echo "🔍 Running RuboCop..."
          echo "=============================="

          # Run RuboCop with GitHub annotations format
          # This will fail the build if there are any violations
          bin/rubocop --format github --format simple

      - name: RuboCop Summary
        if: failure()
        run: |
          echo "❌ RuboCop found style violations!"
          echo ""
          echo "To fix auto-correctable issues, run locally:"
          echo "  bin/rubocop -a"
          echo ""
          echo "To fix all issues (including unsafe), run:"
          echo "  bin/rubocop -A"
          echo ""
          echo "To generate a todo file for gradual fixes:"
          echo "  bin/rubocop --auto-gen-config"
